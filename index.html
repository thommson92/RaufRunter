<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1f2937" />
    <title>Rauf Runter</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/png" href="./assets/icon-192.png" />
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Rauf Runter" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app" class="app"></main>
    <script type="module" src="./src/app.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        // Gab es beim Laden schon einen aktiven SW? Dann ist ein späterer
        // Controller-Wechsel ein UPDATE → einmal neu laden, damit frischer
        // Code greift. Beim Erstbesuch (kein Controller) NICHT neu laden.
        const hadController = !!navigator.serviceWorker.controller;
        let reloaded = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!hadController || reloaded) return;
          reloaded = true;
          location.reload();
        });
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').then((reg) => reg.update()).catch(() => {});
        });
      }
    </script>
  </body>
</html>
